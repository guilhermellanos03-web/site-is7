name: Deploy IS7 → Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build do site (JSX -> dist/)
        run: |
          npm ci
          npm run build

      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 ftp.is7mkt.com.br >> ~/.ssh/known_hosts 2>/dev/null || true
          # Verifica que a chave está válida
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # Sem passo "Testar SSH" separado: a Hostinger limita conexoes rapidas,
      # e abrir uma conexao extra logo antes do deploy fazia o mirror ser
      # recusado ("Password required"). O deploy usa uma unica conexao.

      - name: Deploy via SFTP
        run: |
          # Publica o resultado do build (dist/) no site principal (is7mkt.com.br).
          # dist/ ja contem so o necessario: index.html, IS7 Portfolio.html,
          # assets/, robots.txt e sitemap.xml. O --delete deixa o servidor
          # espelhado com dist/ (sem residuos). A proposta (proposta.is7mkt.com.br)
          # e tarefa separada, deployada depois.
          # dist/ agora e leve (~3.5MB: imagens otimizadas), entao o mirror
          # padrao (compara tamanho+data) sobe rapido e confiavel. O --delete
          # limpa os residuos do site antigo que ainda estiverem no servidor.
          deploy_main() {
            lftp -e "
                set sftp:connect-program 'ssh -a -x -l u194888534 -i /home/runner/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p 65002';
                set net:timeout 180;
                set net:max-retries 4;
                set net:reconnect-interval-base 8;
                open sftp://ftp.is7mkt.com.br;
                mirror -R --delete --no-perms --no-umask \
                  dist/ domains/is7mkt.com.br/public_html/;
                bye
              "
          }
          for attempt in 1 2 3; do
            echo "Tentativa $attempt de 3..."
            if deploy_main; then
              echo "Deploy concluído com sucesso!"
              exit 0
            fi
            echo "Tentativa $attempt falhou. Aguardando 15s antes de tentar novamente..."
            sleep 15
          done
          echo "Todas as tentativas falharam."
          exit 1
