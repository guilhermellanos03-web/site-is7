name: Deploy IS7 → Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 ftp.is7mkt.com.br >> ~/.ssh/known_hosts 2>/dev/null || true
          # Verifica que a chave está válida
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Testar SSH
        run: |
          ssh -i /home/runner/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=no \
            -o BatchMode=yes \
            -p 65002 -v \
            u194888534@ftp.is7mkt.com.br "echo OK" 2>&1 | tail -20

      - name: Deploy via SFTP
        run: |
          lftp -u "u194888534," \
            -e "
              set sftp:connect-program 'ssh -a -x -i /home/runner/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p 65002';
              set net:timeout 60;
              set net:max-retries 3;
              open sftp://ftp.is7mkt.com.br;
              mirror -R \
                --delete \
                --no-perms \
                --no-umask \
                --exclude-glob .git \
                --exclude-glob .github \
                --exclude-glob .claude \
                --exclude-glob node_modules \
                --exclude-glob README.md \
                --exclude-glob '*.state.json' \
                --exclude-glob 'IS7 Site.html' \
                --exclude-glob 'IS7 Portfolio.html' \
                . /public_html/;
              bye
            "
