name: Deploy IS7 → Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp)
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" \
            -e "
              set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -p 65002';
              set net:timeout 30;
              set net:max-retries 3;
              open sftp://ftp.is7mkt.com.br;
              mirror -R \
                --delete \
                --no-perms \
                --no-umask \
                --exclude-glob .git \
                --exclude-glob .github \
                --exclude-glob .claude \
                --exclude-glob node_modules \
                --exclude-glob README.md \
                --exclude-glob '*.state.json' \
                --exclude-glob 'IS7 Site.html' \
                --exclude-glob 'IS7 Portfolio.html' \
                . /public_html/;
              bye
            "
