name: Deploy IS7 → Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 ftp.is7mkt.com.br >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -u "u194888534," \
            -e "
              set sftp:connect-program 'ssh -a -x -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p 65002';
              set net:timeout 60;
              set net:max-retries 3;
              open sftp://ftp.is7mkt.com.br;
              mirror -R \
                --delete \
                --no-perms \
                --no-umask \
                --exclude-glob .git \
                --exclude-glob .github \
                --exclude-glob .claude \
                --exclude-glob node_modules \
                --exclude-glob README.md \
                --exclude-glob '*.state.json' \
                --exclude-glob 'IS7 Site.html' \
                --exclude-glob 'IS7 Portfolio.html' \
                . /public_html/;
              bye
            "
