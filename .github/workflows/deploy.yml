name: Deploy IS7 → Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp)
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Write credentials to netrc to handle special chars in password
          printf 'machine ftp.is7mkt.com.br\nlogin %s\npassword %s\n' "$FTP_USER" "$FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc

          lftp -e "
              set ftp:passive-mode true;
              set ftp:ssl-allow false;
              set net:timeout 30;
              set net:max-retries 3;
              open ftp://ftp.is7mkt.com.br;
              mirror -R \
                --delete \
                --no-perms \
                --no-umask \
                --exclude-glob .git \
                --exclude-glob .github \
                --exclude-glob .claude \
                --exclude-glob node_modules \
                --exclude-glob README.md \
                --exclude-glob '*.state.json' \
                --exclude-glob 'IS7 Site.html' \
                --exclude-glob 'IS7 Portfolio.html' \
                . /public_html/;
              bye
            " ftp.is7mkt.com.br
