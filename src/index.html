  <script type="text/babel" src="site_v2/ChatBot.jsx"></script>

  <script type="text/babel">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "hero": "A",
      "accent": "Roxo → Azul",
      "headingFont": "Montserrat",
      "motion": true
    }/*EDITMODE-END*/;

    const ACCENTS = {
      "Roxo → Azul": { a: "#9145E6", a2: "#3B6CFF", br: "#B57BFF", grad: "linear-gradient(118deg,#9145E6 0%,#5B5BF5 52%,#3B6CFF 100%)" },
      "Roxo":        { a: "#9D4EDD", a2: "#C24BE6", br: "#CB8BFF", grad: "linear-gradient(118deg,#7B2FBE 0%,#A93CD9 55%,#C24BE6 100%)" },
      "Azul":        { a: "#3B6CFF", a2: "#22A6F6", br: "#74A8FF", grad: "linear-gradient(118deg,#2D5BFF 0%,#3B8EF6 55%,#22C3F6 100%)" },
      "Teal":        { a: "#13B8A6", a2: "#3B6CFF", br: "#56E0CE", grad: "linear-gradient(118deg,#0EA38F 0%,#1FA6C9 55%,#3B6CFF 100%)" },
    };
    const FONTS = {
      "Montserrat": "'Montserrat', system-ui, sans-serif",
      "Poppins": "'Poppins', system-ui, sans-serif",
      "Space Grotesk": "'Space Grotesk', system-ui, sans-serif",
    };

    const App = () => {
      const { Header, Hero, Stats, ClientsStrip, Services, BeforeAfter, Deliverables, Portfolio, Reviews, About, Instagram, Faq, Contact, Footer, WhatsAppFab, ChatBot } = window.IS7v2;
      // Fallbacks so app renders even if tweaks-panel.jsx hasn't finished loading yet
      const useTweaks  = window.useTweaks  || ((d) => { const [t,setT] = React.useState(d); return [t,(k,v)=>setT(p=>({...p,[k]:v}))]; });
      const TweaksPanel  = window.TweaksPanel  || (({ children }) => null);
      const TweakSection = window.TweakSection || (() => null);
      const TweakRadio   = window.TweakRadio   || (() => null);
      const TweakToggle  = window.TweakToggle  || (() => null);
      const [t, setTweak] = useTweaks(TWEAKS);

      React.useEffect(() => {
        const r = document.documentElement.style;
        const ac = ACCENTS[t.accent] || ACCENTS["Roxo → Azul"];
        r.setProperty("--accent", ac.a);
        r.setProperty("--accent-2", ac.a2);
        r.setProperty("--accent-bright", ac.br);
        r.setProperty("--grad", ac.grad);
        r.setProperty("--serif", FONTS[t.headingFont] || FONTS.Montserrat);
      }, [t.accent, t.headingFont]);

      React.useEffect(() => {
        document.body.classList.toggle("js-anim", !!t.motion);
      }, [t.motion]);

      return (
        <React.Fragment>
          <Header />
          <main>
            <Hero variant={t.hero} />
            <Stats />
            <Services />
            <BeforeAfter />
            <Deliverables />
            <Portfolio />
            <Reviews />
            <About />
            <Instagram />
            <Faq />
            <Contact />
          </main>
          <Footer />
          <WhatsAppFab />
          <ChatBot />

          <TweaksPanel>
            <TweakSection label="Direção do Hero" />
            <TweakRadio label="Hero" value={t.hero}
              options={[{ value: "A", label: "A · Statement" }, { value: "B", label: "B · Showcase" }]}
              onChange={(v) => setTweak("hero", v)} />
            <TweakSection label="Marca" />
            <TweakRadio label="Cor de destaque" value={t.accent}
              options={["Roxo → Azul", "Roxo", "Azul", "Teal"]}
              onChange={(v) => setTweak("accent", v)} />
            <TweakRadio label="Fonte dos títulos" value={t.headingFont}
              options={["Montserrat", "Poppins", "Space Grotesk"]}
              onChange={(v) => setTweak("headingFont", v)} />
            <TweakSection label="Movimento" />
            <TweakToggle label="Animações" value={t.motion} onChange={(v) => setTweak("motion", v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Rolagem suave nas ancoras internas sem mudar a URL (mantem is7mkt.com.br limpo) -->
  <script>
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest('a[href^="#"]');
      if (!a) return;
      var id = a.getAttribute("href").slice(1);
      if (!id) return;
      var el = document.getElementById(id);
      if (!el) return;
      e.preventDefault();
      el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, true);
    // Se a pagina abrir com #ancora (link externo), rola ate la e limpa a URL
    window.addEventListener("load", function () {
      if (location.hash && location.hash.length > 1) {
        var el = document.getElementById(location.hash.slice(1));
        if (el) setTimeout(function () { el.scrollIntoView({ block: "start" }); }, 300);
        history.replaceState(null, "", location.pathname + location.search);
      }
    });
  </script>
