<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Portfólio — IS7 Assessoria de Marketing Digital</title>
<link rel="icon" type="image/png" href="assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Poppins:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="site_v2/site.css"/>
<!-- Anti-flash: apply saved theme before React mounts -->
<script>(function(){ var t=localStorage.getItem('is7-theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })()</script>
<style>
  .port-hero{
    position:relative; overflow:hidden; padding:140px 0 80px; text-align:center;
  }
  .port-count{
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--mono); font-size:13px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--accent-bright);
    background:rgba(145,69,230,.10); border:1px solid rgba(145,69,230,.25);
    padding:8px 18px; border-radius:9999px; margin-bottom:22px;
  }
  .port-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:24px;
  }
  .port-card{
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    overflow:hidden; display:flex; flex-direction:column;
    transition:transform .3s ease, border-color .3s ease, box-shadow .3s ease;
  }
  .port-card:hover{
    transform:translateY(-6px); border-color:rgba(145,69,230,.45);
    box-shadow:0 24px 50px -22px rgba(91,91,245,.45);
  }
  .port-card:hover .port-img{ transform:scale(1.06); }
  .port-thumb{
    height:240px; overflow:hidden; position:relative;
  }
  .port-img{
    width:100%; height:100%; object-fit:cover; object-position:top center;
    transition:transform .5s ease;
  }
  .port-mono{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  }
  .port-mono span{
    font-family:var(--serif); font-weight:800; font-size:64px;
    letter-spacing:.06em; color:rgba(255,255,255,.88);
  }
  .port-info{ padding:20px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .port-name{ margin:0; font-family:var(--serif); font-weight:700; font-size:17px; }
  .port-meta{ margin:4px 0 0; font-size:13px; color:var(--fg-muted); }
  .port-arrow{
    width:36px; height:36px; border-radius:9999px; border:1px solid var(--line-2);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
    transition:background .25s, border-color .25s;
  }
  .port-card:hover .port-arrow{ background:var(--grad); border-color:transparent; }

  .port-cta{
    margin-top:80px; padding:64px 0; text-align:center; position:relative;
    background:linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    border-top:1px solid var(--line);
  }

  @media(max-width:900px){
    .port-grid{ grid-template-columns:repeat(2,1fr); gap:18px; }
    .port-hero{ padding:120px 0 60px; }
  }
  @media(max-width:580px){
    .port-grid{ grid-template-columns:1fr; gap:16px; }
    .port-thumb{ height:200px; }
  }
  /* light mode overrides */
  [data-theme="light"] .port-card{ box-shadow:0 2px 14px rgba(0,0,0,.07); }
  [data-theme="light"] .port-card:hover{ box-shadow:0 24px 50px -22px rgba(123,47,212,.20); border-color:rgba(123,47,212,.4); }
  [data-theme="light"] .port-cta{ background:linear-gradient(180deg,var(--bg) 0%,var(--bg-2) 100%); }
  [data-theme="light"] .port-mono span{ color:rgba(255,255,255,.92); }
  [data-theme="light"] .port-count{ background:rgba(123,47,212,.08); border-color:rgba(123,47,212,.22); }
  .port-hover-hint{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(7,10,20,.55); opacity:0; transition:opacity .25s; backdrop-filter:blur(2px);
  }
  .port-card:hover .port-hover-hint{ opacity:1; }
</style>
</head>
<body class="js-anim" data-screen-label="IS7 — Portfólio completo">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.js"></script>
  <script src="site_v2/cases.js"></script>
  <script type="text/babel" src="site_v2/SiteCore.jsx"></script>
  <script type="text/babel" src="site_v2/PortfolioLightbox.jsx"></script>

  <script type="text/babel">
    const { Logo, Icon, Eyebrow, Reveal, wa, WAPP } = window.IS7v2;
    const CASES = window.IS7_CASES || [];

    const PortCard = ({ c, i, onOpen }) => (
      <Reveal delay={(i % 3) * 70} as="article" className="port-card" onClick={() => onOpen(c)} style={{ cursor: "pointer" }}>
        <div className="port-thumb" style={{ background: c.grad || "var(--surface-2)", position: "relative" }}>
          {c.img ? (
            <img src={c.img} alt={c.name} loading="lazy" className="port-img" />
          ) : (
            <div className="port-mono"><span>{c.mono}</span></div>
          )}
          <span className="tag tag-accent" style={{ position: "absolute", top: 12, left: 12, backdropFilter: "blur(6px)" }}>{c.tag}</span>
          {c.pages > 1 && (
            <span className="tag" style={{ position: "absolute", top: 12, right: 12, backdropFilter: "blur(6px)" }}>{c.pages} páginas</span>
          )}
          {/* hover overlay */}
          <div className="port-hover-hint">
            <span style={{ display:"flex", alignItems:"center", gap:8, background:"var(--grad)", padding:"10px 18px", borderRadius:9999, fontSize:13.5, fontWeight:600, color:"#fff" }}>
              <Icon name="expand" size={16} /> Ver detalhes
            </span>
          </div>
        </div>
        <div className="port-info">
          <div>
            <p className="port-name">{c.name}</p>
            <p className="port-meta">{c.meta}</p>
          </div>
          <span className="port-arrow">
            <Icon name="expand" size={16} color="var(--accent-bright)" />
          </span>
        </div>
      </Reveal>
    );

    const App = () => {
      const [scrolled, setScrolled] = React.useState(false);
      const [theme, setTheme] = React.useState(() =>
        typeof localStorage !== 'undefined' ? (localStorage.getItem('is7-theme') || 'dark') : 'dark'
      );

      React.useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 16);
        fn(); window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('is7-theme', theme);
      }, [theme]);

      const { useLightbox, PortfolioLightbox } = window.IS7v2;
      const [active, setActive] = useLightbox();

      return (
        <React.Fragment>
          {/* Header */}
          <header className={`hdr ${scrolled ? "scrolled" : ""}`}>
            <div className="wrap hdr-row">
              <a href="/" aria-label="IS7"><Logo size={26} /></a>
              <nav className="nav">
                <a href="/">Início</a>
                <a href="/#servicos">Serviços</a>
                <a href="/#sobre">Sobre</a>
                <a href="/#contato">Contato</a>
              </nav>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <button className="theme-toggle" aria-label="Alternar tema"
                  onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}>
                  <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={17} />
                </button>
                <a href={wa("Olá! Vi o portfólio da IS7 e quero um projeto assim também.")} target="_blank" rel="noreferrer" className="btn btn-primary" style={{ padding: "12px 24px", fontSize: 14 }}>
                  Fale conosco
                </a>
              </div>
            </div>
          </header>

          {/* Hero */}
          <section className="port-hero">
            <div className="glow glow-purple" style={{ width: 500, height: 500, top: -200, left: "50%", transform: "translateX(-50%)", animation: "glow-morph 12s ease-in-out infinite" }} />
            <div className="gridlines" />
            <div className="wrap" style={{ position: "relative", zIndex: 2 }}>
              <Reveal>
                <a href="/" className="link-arrow" style={{ justifyContent: "center", marginBottom: 28 }}>
                  <Icon name="arrow-left" size={15} /> Voltar ao site
                </a>
              </Reveal>
              <Reveal delay={60}>
                <span className="port-count">
                  <Icon name="layout-grid" size={14} /> {CASES.length} projetos entregues
                </span>
              </Reveal>
              <Reveal delay={100}>
                <h1 className="display" style={{ maxWidth: 800, margin: "0 auto" }}>
                  Nosso <span className="grad-text">portfólio</span>
                </h1>
              </Reveal>
              <Reveal delay={140}>
                <p className="lead" style={{ maxWidth: 560, margin: "22px auto 0" }}>
                  Sites, lojas virtuais e projetos de presença digital desenvolvidos para negócios reais em todo o Brasil.
                </p>
              </Reveal>
            </div>
          </section>

          {/* Grid */}
          <section style={{ paddingBottom: 80 }}>
            <div className="wrap">
              <div className="port-grid">
                {CASES.map((c, i) => <PortCard key={i} c={c} i={i} onOpen={setActive} />)}
              </div>
            </div>
          </section>

          {/* CTA */}
          <section className="port-cta">
            <div className="glow glow-blue" style={{ width: 400, height: 400, top: -120, left: "50%", transform: "translateX(-50%)", opacity: .35 }} />
            <div className="wrap" style={{ position: "relative", zIndex: 2 }}>
              <Reveal>
                <Eyebrow center>Quer um projeto assim?</Eyebrow>
                <h2 className="h2" style={{ marginTop: 16 }}>Seu negócio pode ser o <span className="grad-text">próximo case</span>.</h2>
                <p className="lead" style={{ maxWidth: 500, margin: "18px auto 0" }}>
                  Fale com a gente e descubra como sua empresa pode ter uma presença digital que vende todos os dias.
                </p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 14, justifyContent: "center", marginTop: 32 }}>
                  <a href={wa("Olá! Vi o portfólio da IS7 e quero um projeto assim também.")} target="_blank" rel="noreferrer" className="btn btn-primary btn-lg">
                    Quero meu projeto <Icon name="arrow-right" size={18} />
                  </a>
                  <a href="/#contato" className="btn btn-ghost btn-lg">Entrar em contato</a>
                </div>
              </Reveal>
            </div>
          </section>

          {/* Footer mini */}
          <footer style={{ borderTop: "1px solid var(--line)", padding: "28px 0", textAlign: "center" }}>
            <div className="wrap" style={{ display: "flex", flexWrap: "wrap", gap: 14, justifyContent: "space-between", alignItems: "center" }}>
              <Logo size={22} />
              <p style={{ margin: 0, fontSize: 12, color: "var(--fg-dim)" }}>© 2026 IS7 · Todos os direitos reservados</p>
            </div>
          </footer>

          {/* Lightbox */}
          {active && <PortfolioLightbox c={active} onClose={() => setActive(null)} />}

          {/* WhatsApp FAB */}
          <a className="fab" href={wa("Olá! Vi o portfólio da IS7 e quero saber mais.")} target="_blank" rel="noreferrer" aria-label="WhatsApp">
            <svg viewBox="0 0 32 32" style={{ width: 30, height: 30, fill: "#04210F" }}><path d="M16.004 0h-.008C7.174 0 .002 7.174.002 16c0 3.5 1.128 6.744 3.046 9.378L1.058 31.116l5.944-1.91A15.91 15.91 0 0 0 16.004 32C24.826 32 32 24.826 32 16S24.826 0 16.004 0zm9.314 22.594c-.39 1.1-1.932 2.014-3.168 2.282-.846.18-1.95.324-5.668-1.218-4.76-1.972-7.822-6.8-8.06-7.116-.228-.316-1.916-2.554-1.916-4.872 0-2.318 1.214-3.456 1.644-3.928.39-.428 1.022-.624 1.63-.624.196 0 .372.01.53.018.468.02.702.048 1.012.784.386.918 1.326 3.236 1.442 3.472.118.236.236.55.078.866-.148.326-.278.53-.514.808-.236.278-.458.492-.694.792-.216.26-.46.538-.196.996.264.45 1.174 1.936 2.522 3.136 1.732 1.54 3.192 2.02 3.642 2.236.35.168.766.128 1.04-.168.348-.382.78-.998 1.218-1.606.314-.434.708-.49 1.098-.332.396.148 2.508 1.182 2.938 1.398.43.216.716.324.822.504.104.18.104 1.042-.286 2.142z"/></svg>
          </a>
        </React.Fragment>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
